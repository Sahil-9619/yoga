<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
        }
        h2 {
            font-family: 'Cormorant Garamond', 'Georgia', serif !important;
        }
    </style>
</head>
<body style="background-color: #F6F8F6; padding: 50px 20px; margin: 0;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 32px; overflow: hidden; box-shadow: 0 20px 50px rgba(13, 51, 33, 0.06); border: 1px solid rgba(20, 80, 50, 0.08);">
        
        <!-- Premium Header Banner -->
        <div style="background: linear-gradient(135deg, #0A2518 0%, #123C27 100%); padding: 45px 40px; text-align: center; border-bottom: 4px solid #C5A880;">
            <div style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.35em; text-transform: uppercase; color: #C5A880; margin-bottom: 10px;">SAARGAMM BHARTIYE</div>
            <div style="font-family: 'Cormorant Garamond', 'Georgia', serif; font-size: 32px; color: #ffffff; font-style: italic; font-weight: 300; letter-spacing: 0.02em; line-height: 1.2;">
                Harmonize <span style="color: #4ADE80; font-weight: 400;">Energy & Spirit</span>
            </div>
        </div>
        
        <!-- Body Content -->
        <div style="padding: 45px 45px; background-color: #ffffff;">
            {{body}}
        </div>

        <!-- Footer -->
        <div style="background-color: #F9FBF9; padding: 35px 45px; border-top: 1px solid rgba(20, 80, 50, 0.05); text-align: center;">
            <p style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; color: #6B7C70; margin: 0 0 12px 0; line-height: 1.6;">
                This is an automated security notification from Saargamm Bhartiye.
            </p>
            <div style="width: 40px; height: 1px; background-color: #C5A880; margin: 15px auto; opacity: 0.5;"></div>
            <p style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; color: #9EAEA2; margin: 0; letter-spacing: 0.05em; text-transform: uppercase;">
                © 2026 Saargamm Bhartiye. All rights reserved.
            </p>
        </div>
        
    </div>
</body>
</html>
